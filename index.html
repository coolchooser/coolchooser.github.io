<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CoolChooser</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  html, body {
    margin:0;
    padding:0;
    font-family: 'Roboto', sans-serif;
    height:100%;
    overflow-x:hidden;
    background: linear-gradient(160deg, #FFB347, #FF7E5F);
    display:flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width:100%;
    padding:20px;
    display:flex;
    justify-content: space-between;
    align-items:center;
  }

  h1 { 
    margin:0; 
    font-size:28px; 
    color:#fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  }

  .info-btn {
    background: rgba(255,255,255,0.2);
    border:none;
    color:white;
    font-size:24px;
    padding:8px 12px;
    border-radius:50%;
    cursor:pointer;
    transition:0.3s;
  }
  .info-btn:hover { background: rgba(255,255,255,0.35); }

  main {
    flex:1;
    width:100%;
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap:20px;
  }

  .game-btn {
    width:80%;
    max-width:350px;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:20px;
    background: rgba(255,255,255,0.2);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
    transition:0.3s;
  }

  .game-btn:hover { 
    background: rgba(255,255,255,0.35);
  }

  .game-btn i {
    font-size:28px;
  }

  /* Portrait mode */
  @media screen and (orientation: landscape) {
    body::after {
      content: "Please rotate your device to portrait mode!";
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background:#FF7E5F;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      font-size:24px;
      z-index:9999;
    }
  }
</style>
</head>
<body>

<header>
  <h1>CoolChooser</h1>
  <button class="info-btn" onclick="location.href='info.html'">
    <i class="fas fa-circle-info"></i>
  </button>
</header>

<main>
  <button class="game-btn" onclick="location.href='finger.html'">
    <i class="fas fa-hand-pointer"></i> Finger Game
  </button>
  <button class="game-btn" onclick="location.href='name.html'">
    <i class="fas fa-user-friends"></i> Name Spinner
  </button>
  <button class="game-btn" onclick="location.href='number.html'">
    <i class="fas fa-dice"></i> Random Number
  </button>
</main>

</body>
</html>
