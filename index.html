<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Finger Selector</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    background: linear-gradient(160deg, #a1c4fd, #c2e9fb);
  }

  h1 {
    margin: 20px;
    text-align: center;
    color: #333;
    font-size: 28px;
  }

  #canvas {
    border-radius: 20px;
    border: 2px solid rgba(0,0,0,0.2);
    background: rgba(255,255,255,0.3);
    touch-action: none;
    width: 90%;
    max-width: 500px;
    height: 400px;
    margin-bottom: 20px;
  }

  .button {
    padding: 15px 40px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    background: #ff6f61;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  }

  .button:hover {
    background: #ff8b75;
  }

  #result {
    margin-top: 15px;
    font-size: 24px;
    font-weight: bold;
    color: #333;
  }

  @keyframes glowPulse {
    0% { box-shadow: 0 0 10px 2px rgba(255,0,0,0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(255,0,0,0.8); }
    100% { box-shadow: 0 0 10px 2px rgba(255,0,0,0.5); }
  }
</style>
</head>
<body>

<h1>Mobile Finger Selector</h1>
<canvas id="canvas"></canvas>
<button class="button" onclick="chooseRandomFinger()">Go!</button>
<p id="result"></p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.clientWidth;
canvas.height = canvas.clientHeight;

let fingers = [];

// Draw fingers with optional highlight
function drawFingers(highlightIndex = -1) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  fingers.forEach((f, i) => {
    ctx.beginPath();
    let radius = f.radius || 30;
    ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = (i === highlightIndex) ? 'rgba(255,0,0,0.7)' : 'rgba(0,150,255,0.6)';
    ctx.shadowColor = (i === highlightIndex) ? 'rgba(255,0,0,0.8)' : 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = (i === highlightIndex) ? 20 : 10;
    ctx.fill();
    ctx.fillStyle = (i === highlightIndex) ? '#fff' : '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, f.x, f.y);
  });
}

// Touch event handling
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  fingers = [];
  for (let t of e.touches) {
    // Use radiusX/radiusY for finger size if available
    let avgRadius = t.radiusX && t.radiusY ? (t.radiusX + t.radiusY) * 10 : 30;
    fingers.push({
      x: t.clientX - canvas.getBoundingClientRect().left,
      y: t.clientY - canvas.getBoundingClientRect().top,
      radius: avgRadius
    });
  }
  drawFingers();
});

// Allow mouse clicks for testing
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  fingers.push({ x: e.clientX - rect.left, y: e.clientY - rect.top, radius: 30 });
  drawFingers();
});

// Randomly choose a finger with animation
function chooseRandomFinger() {
  if (fingers.length === 0) {
    document.getElementById('result').textContent = "Place your fingers first!";
    return;
  }

  const selectedIndex = Math.floor(Math.random() * fingers.length);
  document.getElementById('result').textContent = `Finger #${selectedIndex + 1} selected!`;

  let pulseCount = 0;
  const pulseAnimation = setInterval(() => {
    drawFingers(selectedIndex);
    pulseCount++;
    if (pulseCount > 8) clearInterval(pulseAnimation);
  }, 150);
}
</script>

</body>
</html>
