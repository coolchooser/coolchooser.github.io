<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Selector</title>
    <style>
        /* Terminal / Futuristic Theme styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020a02; /* Very dark green/black */
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* Prevents browser zooming/scrolling */
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; /* Futuristic grid background */
            z-index: 1;
        }

        /* Futuristic Glowing Start Button */
        #startButton {
            position: relative;
            z-index: 10;
            padding: 15px 40px;
            font-size: 28px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #00ff00;
            background-color: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5), inset 0 0 10px rgba(0, 255, 0, 0.2);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.2s ease;
            outline: none;
        }

        #startButton:active {
            background-color: #00ff00;
            color: #020a02;
            box-shadow: 0 0 30px #00ff00, inset 0 0 20px #00ff00;
        }
    </style>
</head>
<body>

    <button id="startButton">START</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        // Resize canvas to fill the screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Game State Variables
        let touches = {};
        let phase = 'init'; // 'init', 'waiting', 'countdown', 'roulette', 'winner'
        let countdownTimer = null;
        let countdownValue = 3;
        let rouletteInterval = null;
        let rouletteTimeout = null;
        let highlightedTouchId = null;
        let winnerTouchId = null;

        // Colors
        const COLOR_DEFAULT = '#00ff00'; // Neon Green
        const COLOR_HIGHLIGHT = '#ffffff'; // White flash for roulette
        const COLOR_WINNER = '#ff0000'; // Red for the chosen one
        const COLOR_DIM = '#004400'; // Dim green for losers

        // Start Button Logic
        startButton.addEventListener('click', () => {
            startButton.style.display = 'none';
            phase = 'waiting';
        });

        // Handle multi-touch events
        function handleTouches(e) {
            e.preventDefault(); // Stop default browser behaviors
            
            if (phase === 'init') return; // Ignore touches until START is pressed

            touches = {};
            for (let i = 0; i < e.touches.length; i++) {
                touches[e.touches[i].identifier] = {
                    x: e.touches[i].clientX,
                    y: e.touches[i].clientY
                };
            }
            updateGameState();
        }

        // Attach touch listeners
        canvas.addEventListener('touchstart', handleTouches, { passive: false });
        canvas.addEventListener('touchmove', handleTouches, { passive: false });
        canvas.addEventListener('touchend', handleTouches, { passive: false });
        canvas.addEventListener('touchcancel', handleTouches, { passive: false });

        function updateGameState() {
            const numTouches = Object.keys(touches).length;

            if (phase === 'waiting') {
                if (numTouches >= 2) {
                    startCountdown();
                }
            } else if (phase === 'countdown') {
                if (numTouches < 2) {
                    resetGame(); // Cancel if someone lets go early
                }
            } else if (phase === 'winner' || phase === 'roulette') {
                if (numTouches === 0) {
                    resetGame(); // Reset when everyone lets go
                }
            }
        }

        function startCountdown() {
            phase = 'countdown';
            countdownValue = 3;
            
            countdownTimer = setInterval(() => {
                countdownValue--;
                if (countdownValue <= 0) {
                    clearInterval(countdownTimer);
                    startRoulette();
                }
            }, 1000);
        }

        function startRoulette() {
            phase = 'roulette';
            
            // Rapidly flash random fingers
            rouletteInterval = setInterval(() => {
                const keys = Object.keys(touches);
                if (keys.length === 0) return resetGame();
                highlightedTouchId = keys[Math.floor(Math.random() * keys.length)];
            }, 150);

            // Settle on a winner after 2.5 seconds
            rouletteTimeout = setTimeout(() => {
                clearInterval(rouletteInterval);
                const keys = Object.keys(touches);
                if (keys.length > 0) {
                    winnerTouchId = keys[Math.floor(Math.random() * keys.length)];
                    phase = 'winner';
                } else {
                    resetGame();
                }
            }, 2500);
        }

        function resetGame() {
            clearInterval(countdownTimer);
            clearInterval(rouletteInterval);
            clearTimeout(rouletteTimeout);
            phase = 'waiting';
            highlightedTouchId = null;
            winnerTouchId = null;
        }

        // Render Loop
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const keys = Object.keys(touches);

            // Draw "Waiting" Text if no fingers are down
            if (phase === 'waiting' && keys.length === 0) {
                ctx.fillStyle = COLOR_DEFAULT;
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLOR_DEFAULT;
                ctx.font = '24px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('> PLACE FINGERS <', canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;
            }

            // Draw Countdown
            if (phase === 'countdown') {
                ctx.fillStyle = COLOR_DEFAULT;
                ctx.shadowBlur = 20;
                ctx.shadowColor = COLOR_DEFAULT;
                ctx.font = 'bold 120px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(countdownValue, canvas.width / 2, canvas.height / 2);
                
                ctx.font = '20px Courier New';
                ctx.fillText('HOLD STEADY...', canvas.width / 2, canvas.height / 2 + 80);
                ctx.shadowBlur = 0; 
            }

            // Draw Fingers
            keys.forEach(id => {
                const touch = touches[id];
                let color = COLOR_DEFAULT;
                let radius = 50;

                if (phase === 'roulette') {
                    color = (id === highlightedTouchId) ? COLOR_HIGHLIGHT : COLOR_DEFAULT;
                    radius = (id === highlightedTouchId) ? 60 : 50;
                } else if (phase === 'winner') {
                    color = (id === winnerTouchId) ? COLOR_WINNER : COLOR_DIM;
                    radius = (id === winnerTouchId) ? 70 : 40;
                }

                // Add Glow Effect
                ctx.shadowBlur = 25;
                ctx.shadowColor = color;

                // Outer Circle
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, radius, 0, Math.PI * 2);
                ctx.strokeStyle = color;
                ctx.lineWidth = (phase === 'winner' && id === winnerTouchId) ? 8 : 4;
                ctx.stroke();

                // Inner Dot
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                // Winner Text
                if (phase === 'winner' && id === winnerTouchId) {
                    ctx.font = 'bold 24px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText('[ SELECTED ]', touch.x, touch.y - 100);
                }
                
                ctx.shadowBlur = 0; 
            });

            requestAnimationFrame(draw);
        }

        // Start render loop
        draw();
    </script>
</body>
</html>
