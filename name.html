<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Name Spinner</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
html, body {
  margin:0; padding:0;
  font-family:'Roboto',sans-serif;
  height:100%;
  background: linear-gradient(160deg, #FFB347, #FF7E5F);
  display:flex;
  flex-direction: column;
  align-items:center;
}
.back-btn {
  position:absolute;
  top:15px;
  left:15px;
  padding:10px 15px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background: rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}
.container {
  margin-top:80px;
  text-align:center;
  width:90%;
}
input, button {
  width:80%;
  max-width:300px;
  padding:12px 15px;
  border-radius:12px;
  border:none;
  font-size:16px;
  margin:5px 0;
}
button {
  background: rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}
#result {
  margin-top:15px;
  font-size:24px;
  font-weight:bold;
}
@media screen and (orientation: landscape){
  body::after{
    content:"Please rotate your device to portrait mode!";
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:#FF7E5F;color:white;
    display:flex;justify-content:center;align-items:center;
    text-align:center;font-size:24px;z-index:9999;
  }
}
</style>
</head>
<body>

<button class="back-btn" onclick="location.href='index.html'">
  <i class="fas fa-home"></i> Home
</button>

<div class="container">
  <p>Enter names separated by commas:</p>
  <input type="text" id="names" placeholder="Alice,Bob,Charlie">
  <button onclick="spinName()">Spin!</button>
  <p id="result"></p>
</div>

<script>
function spinName(){
  const input=document.getElementById('names').value;
  if(!input){document.getElementById('result').textContent="Add names!";return;}
  const arr=input.split(',').map(n=>n.trim()).filter(n=>n);
  const choice=arr[Math.floor(Math.random()*arr.length)];
  document.getElementById('result').textContent=`Chosen: ${choice}`;
}
</script>

</body>
</html>
